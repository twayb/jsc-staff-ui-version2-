<div class="w-full px-4 sm:px-6 py-10">
  <app-breadcrumb [items]="breadcrumbItems" />

  <app-data-table
    class="block animate-fade-in-up stagger-1"
    title="Interview List"
    subtitle="Online interviews scheduled across all cadres"
    [data]="interviews"
    [loading]="loading()"
    [searchFields]="['cadre', 'interviewType']"
    addLabel="Schedule Interview"
    addIcon="pi pi-plus"
    dataKey="id"
    (add)="onAdd()"
  >
    <ng-template #headerTpl>
      <tr>
        <th class="pl-6">No</th>
        <th>Cadre</th>
        <th>Interview Type</th>
        <th>Questions</th>
        <th>Start</th>
        <th>End</th>
        <th class="text-center pr-6">Action</th>
      </tr>
    </ng-template>

    <ng-template #bodyTpl let-interview let-rowIndex="rowIndex">
      <tr>
        <td class="pl-6">{{ rowIndex + 1 }}</td>
        <td>{{ interview.cadre }}</td>
        <td>
          <p-tag [value]="interview.interviewType" [severity]="interviewTypeSeverity(interview.interviewType)" />
        </td>
        <td>{{ interview.questionCount }}</td>
        <td>{{ interview.scheduledDate }} {{ interview.scheduledTime }}</td>
        <td>{{ interview.endDate }} {{ interview.endTime }}</td>
        <td class="text-center pr-6">
          <button
            type="button"
            (click)="onView(interview)"
            class="flex items-center justify-center w-8 h-8 rounded-lg text-value hover:bg-row-b hover:text-heading transition-colors mx-auto"
            aria-label="View interview"
          >
            <i class="pi pi-eye text-sm"></i>
          </button>
        </td>
      </tr>
    </ng-template>
  </app-data-table>
</div>
