<div class="w-full px-4 sm:px-6 py-10">
  <app-breadcrumb [items]="breadcrumbItems" />

  <app-data-table
    class="block animate-fade-in-up stagger-1"
    title="Employee Management"
    subtitle="Oversee staff records across departments"
    [data]="employees"
    [loading]="loading()"
    [searchFields]="['name', 'department', 'position']"
    dataKey="name"
  >
    <ng-template #headerTpl>
      <tr>
        <th class="pl-6">No</th>
        <th>Name</th>
        <th>Department</th>
        <th>Position</th>
        <th class="pr-6">Status</th>
      </tr>
    </ng-template>

    <ng-template #bodyTpl let-employee let-rowIndex="rowIndex">
      <tr>
        <td class="pl-6">{{ rowIndex + 1 }}</td>
        <td>{{ employee.name }}</td>
        <td>{{ employee.department }}</td>
        <td>{{ employee.position }}</td>
        <td class="pr-6">
          <p-tag [value]="employee.status" [severity]="statusSeverity(employee.status)" />
        </td>
      </tr>
    </ng-template>
  </app-data-table>
</div>
