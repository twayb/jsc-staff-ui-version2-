<div class="min-h-screen flex bg-bg">
  <!-- Branding panel -->
  <div class="hidden lg:flex lg:w-[65%] relative overflow-hidden">
    <!-- Base: brand color fills the whole panel -->
    <div class="absolute inset-0 bg-hero-gradient-b"></div>

    <!-- Building image, masked to fade seamlessly into the color beneath -->
    <img
      src="/images/jsc.jpg"
      alt="JSC Building"
      class="absolute inset-x-0 top-0 h-3/5 min-h-[320px] w-full object-cover"
      style="mask-image: linear-gradient(to bottom, black 55%, transparent 100%); -webkit-mask-image: linear-gradient(to bottom, black 55%, transparent 100%);"
    />
    <div
      class="absolute inset-x-0 top-0 h-3/5 min-h-[320px] bg-black/35"
      style="mask-image: linear-gradient(to bottom, black 55%, transparent 100%); -webkit-mask-image: linear-gradient(to bottom, black 55%, transparent 100%);"
    ></div>

    <div class="absolute bottom-0 right-0 w-80 h-80 rounded-full bg-white/10 blur-3xl animate-float-slow"></div>

    <div class="relative z-10 flex flex-col justify-between h-full px-8 xl:px-16 py-12 text-white animate-fade-in-up">
      <div class="flex items-center gap-3"></div>
      <div>
        <h2 class="text-4xl font-bold leading-tight mb-4">Welcome back to<br />REDMIS</h2>
        <p class="text-white/80 text-lg max-w-md">Recruitment handling, complaint handling, and interview management — all in one place.</p>
      </div>
    </div>
  </div>

  <!-- Form panel -->
  <div class="flex flex-1 flex-col px-4 sm:px-8 md:px-12 lg:px-16 py-8 sm:py-12">
    <div class="flex flex-1 items-center justify-center">
      <div class="w-full max-w-md animate-fade-in-up">
        <ng-content></ng-content>
      </div>
    </div>
    <footer class="text-center text-xs text-value">
      Copyright © {{ currentYear }} Judicial Service Commission.
    </footer>
  </div>
</div>

<p-toast />
