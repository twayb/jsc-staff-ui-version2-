<div [ngClass]="card ? 'bg-card border border-border rounded-2xl' : ''">
  @if (loading) {
    <div class="!border-0 !border-b !border-border px-4 py-3">
      <app-skeleton variant="list" [rows]="1" class="block max-w-xs" />
    </div>
    <app-skeleton variant="table" [rows]="skeletonRows" [columns]="skeletonColumns" class="block p-6" />
  } @else {
    <p-toolbar [ngClass]="card ? '!border-0 !border-b !border-border !rounded-b-none !bg-transparent' : '!border-0 !border-b !border-border !rounded-none !bg-transparent'">
      <ng-template #start>
        <div>
          <h1 class="text-lg font-semibold text-heading">{{ title }}</h1>
          @if (subtitle) {
            <p class="text-xs text-value">{{ subtitle }}</p>
          }
        </div>
      </ng-template>
      @if (searchFields.length || addLabel) {
        <ng-template #end>
          <div class="flex items-center gap-2">
            @if (searchFields.length) {
              <p-iconfield>
                <p-inputicon class="pi pi-search" />
                <input
                  pInputText
                  type="text"
                  placeholder="Search"
                  (input)="dt.filterGlobal($any($event.target).value, 'contains')"
                />
              </p-iconfield>
            }
            @if (addLabel) {
              <p-button
                [label]="addLabel"
                [icon]="addIcon"
                (onClick)="add.emit()"
                [text]="true"
                class="transition-transform duration-150 hover:scale-105 active:scale-95"
              />
            }
          </div>
        </ng-template>
      }
    </p-toolbar>

    <p-table
      #dt
      class="text-sm"
      [value]="data"
      [paginator]="true"
      [rows]="rows"
      [rowsPerPageOptions]="rowsPerPageOptions"
      [globalFilterFields]="searchFields"
      [rowHover]="true"
      [scrollable]="true"
      [scrollHeight]="scrollHeight"
      [dataKey]="dataKey ?? ''"
    >
      <ng-template #header>
        <ng-container *ngTemplateOutlet="headerTemplate ?? null" />
      </ng-template>

      <ng-template #body let-row let-rowIndex="rowIndex">
        <ng-container *ngTemplateOutlet="bodyTemplate ?? null; context: { $implicit: row, rowIndex: rowIndex }" />
      </ng-template>

      <ng-template #emptymessage>
        @if (emptyTemplate) {
          <ng-container *ngTemplateOutlet="emptyTemplate" />
        } @else {
          <tr>
            <td [attr.colspan]="skeletonColumns" class="text-center text-value py-8">No records found.</td>
          </tr>
        }
      </ng-template>
    </p-table>
  }
</div>
