<div class="app-shell h-screen flex bg-bg overflow-hidden">
  @if (layout.mode() === 'vertical') {
    <app-sidebar [collapsed]="sidebarCollapsed()" class="print:hidden" />
  }

  <div class="flex-1 flex flex-col min-w-0 h-full overflow-hidden">
    <app-header
      [showLogo]="layout.mode() === 'horizontal'"
      [showSidebarToggle]="layout.mode() === 'vertical'"
      (sidebarToggle)="toggleSidebar()"
      (wellnessTrigger)="onWellnessTrigger()"
      class="print:hidden"
    />

    @if (layout.mode() === 'horizontal') {
      <app-topnav class="print:hidden" />
    }

    <main class="app-shell-main flex-1 overflow-y-auto scrollbar-hide" [style.zoom.%]="textSize.scale()">
      <router-outlet />
    </main>

    <app-footer class="print:hidden" />
  </div>

  <p-toast class="print:hidden" />
  <p-confirmdialog class="print:hidden" />
  <app-wellness-buddy class="print:hidden" />
</div>
