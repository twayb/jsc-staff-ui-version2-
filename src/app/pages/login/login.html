<app-auth-layout>
  <div class="mb-8 flex flex-col items-center text-center">
    <img src="/tume.png" alt="JSC" class="w-40 h-40 object-contain mb-4" />
    <h1 class="text-2xl font-semibold text-heading">Sign in</h1>
    <p class="text-sm text-value mt-1">Enter your credentials to access your account</p>
  </div>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-5">
        <div class="flex flex-col gap-1.5 animate-fade-in-up stagger-1">
          <label for="email" class="text-sm font-medium text-heading">Email</label>
          <p-iconfield>
            <p-inputicon class="pi pi-envelope" />
            <input
              pInputText
              id="email"
              type="email"
              formControlName="email"
              placeholder="you@example.com"
              autocomplete="email"
              fluid
              [invalid]="form.controls.email.invalid && form.controls.email.touched"
            />
          </p-iconfield>
          @if (form.controls.email.invalid && form.controls.email.touched) {
            <span class="text-xs text-danger">Enter a valid email address</span>
          }
        </div>

        <div class="flex flex-col gap-1.5 animate-fade-in-up stagger-2">
          <label for="password" class="text-sm font-medium text-heading">Password</label>
          <p-iconfield>
            <p-inputicon class="pi pi-lock" />
            <p-password
              inputId="password"
              formControlName="password"
              [toggleMask]="true"
              [feedback]="false"
              [fluid]="true"
              placeholder="Enter your password"
              autocomplete="current-password"
            />
          </p-iconfield>
          @if (form.controls.password.invalid && form.controls.password.touched) {
            <span class="text-xs text-danger">Password must be at least 6 characters</span>
          }
        </div>

        <div class="flex items-center justify-between animate-fade-in-up stagger-3">
          <div class="flex items-center gap-2">
            <p-checkbox formControlName="rememberMe" [binary]="true" inputId="rememberMe" />
            <label for="rememberMe" class="text-sm text-value">Remember me</label>
          </div>
          <a routerLink="/forgot-password" class="text-sm text-primary hover:text-primary-hover">Forgot password?</a>
        </div>

        <div class="animate-fade-in-up stagger-4">
          <p-button
            type="submit"
            label="Sign In"
            [loading]="submitting"
            [fluid]="true"
            styleClass="transition-transform duration-150 hover:scale-[1.01] active:scale-[0.99]"
          />
        </div>
      </form>
</app-auth-layout>
