<p-toast />

<app-auth-layout>
  <div class="mb-8 flex flex-col items-center text-center">
    <img src="/tume.png" alt="JSC" class="w-20 h-20 object-contain mb-4" />
    <h1 class="text-2xl font-semibold text-heading">Screen Locked</h1>
    <p class="text-sm text-value mt-1">Enter your password to continue as {{ userName }}</p>
  </div>

  <form [formGroup]="form" (ngSubmit)="onUnlock()" class="flex flex-col gap-5">
    <div class="flex flex-col gap-1.5 animate-fade-in-up stagger-1">
      <label for="password" class="text-sm font-medium text-heading">Password</label>
      <p-iconfield>
        <p-inputicon class="pi pi-lock" />
        <p-password
          inputId="password"
          formControlName="password"
          [toggleMask]="true"
          [feedback]="false"
          [fluid]="true"
          placeholder="Enter your password"
          autocomplete="current-password"
        />
      </p-iconfield>
      @if (form.controls.password.invalid && form.controls.password.touched) {
        <span class="text-xs text-danger">Password is required</span>
      }
    </div>

    <div class="animate-fade-in-up stagger-2">
      <p-button
        type="submit"
        label="Unlock"
        [loading]="unlocking()"
        [fluid]="true"
        styleClass="transition-transform duration-150 hover:scale-[1.01] active:scale-[0.99]"
      />
    </div>

    <p class="text-center text-sm text-value animate-fade-in-up stagger-3">
      <button
        type="button"
        (click)="signInAsDifferentUser()"
        class="text-primary hover:text-primary-hover font-medium"
      >
        Not you? Sign in as a different user
      </button>
    </p>
  </form>
</app-auth-layout>
