<div class="w-full px-4 sm:px-6 py-10">
  <app-breadcrumb [items]="breadcrumbItems" />

  @if (loading()) {
    <app-skeleton variant="cards" [count]="2" [cardCols]="2" />
  } @else {
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-6 mb-6">
      <div class="bg-card border border-border rounded-2xl p-6 flex items-center gap-4 animate-fade-in-up stagger-1">
        <span class="flex items-center justify-center w-12 h-12 rounded-xl shrink-0 bg-primary/10">
          <i class="pi pi-users text-xl text-primary"></i>
        </span>
        <div>
          <p class="text-2xl font-semibold text-heading tabular-nums" [appCountUp]="totalApplicants"></p>
          <p class="text-sm text-value">Total Applicants in Databank</p>
        </div>
      </div>
      <div class="bg-card border border-border rounded-2xl p-6 animate-fade-in-up stagger-2">
        <p class="text-sm text-value mb-4">Applicants by Gender</p>
        <div class="flex items-center gap-6">
          <div class="flex items-center gap-3">
            <span class="flex items-center justify-center w-10 h-10 rounded-lg shrink-0 bg-info-bg">
              <i class="pi pi-mars text-info text-sm"></i>
            </span>
            <div>
              <p class="text-xl font-semibold text-heading tabular-nums" [appCountUp]="maleApplicants"></p>
              <p class="text-xs text-label">Male</p>
            </div>
          </div>
          <div class="flex items-center gap-3">
            <span class="flex items-center justify-center w-10 h-10 rounded-lg shrink-0 bg-warning-bg">
              <i class="pi pi-venus text-warning text-sm"></i>
            </span>
            <div>
              <p class="text-xl font-semibold text-heading tabular-nums" [appCountUp]="femaleApplicants"></p>
              <p class="text-xs text-label">Female</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  }

  <app-data-table
    class="block animate-fade-in-up stagger-1"
    title="Databank by Cadre"
    subtitle="Applicant databank grouped by cadre"
    [data]="cadres"
    [loading]="loading()"
    [searchFields]="['referenceNo', 'cadre']"
    dataKey="referenceNo"
  >
    <ng-template #headerTpl>
      <tr>
        <th class="pl-6">No</th>
        <th>Ref No</th>
        <th>Cadre</th>
        <th>Applicants</th>
        <th class="text-center pr-6">Action</th>
      </tr>
    </ng-template>

    <ng-template #bodyTpl let-cadre let-rowIndex="rowIndex">
      <tr>
        <td class="pl-6">{{ rowIndex + 1 }}</td>
        <td>{{ cadre.referenceNo }}</td>
        <td>{{ cadre.cadre }}</td>
        <td>{{ cadre.applicants }}</td>
        <td class="text-center pr-6">
          <button
            type="button"
            (click)="onViewCandidate(cadre)"
            class="flex items-center justify-center w-8 h-8 rounded-lg text-value hover:bg-row-b hover:text-heading transition-colors mx-auto"
            aria-label="View candidate"
            pTooltip="View Candidate"
            tooltipPosition="top"
          >
            <i class="pi pi-eye text-sm"></i>
          </button>
        </td>
      </tr>
    </ng-template>
  </app-data-table>
</div>
