<div class="w-full px-4 sm:px-6 py-10">
  <app-breadcrumb [items]="breadcrumbItems" />

  <app-data-table
    class="block animate-fade-in-up stagger-1"
    title="Databank List"
    [subtitle]="cadre ? 'Candidates in databank for ' + cadre : 'Candidates in databank'"
    [data]="candidates"
    [loading]="loading()"
    [searchFields]="['name', 'status']"
    dataKey="name"
  >
    <ng-template #headerTpl>
      <tr>
        <th class="pl-6">No</th>
        <th>Name</th>
        <th>Age</th>
        <th>Gender</th>
        <th>Marks</th>
        <th>Status</th>
        <th class="text-center pr-6">Action</th>
      </tr>
    </ng-template>

    <ng-template #bodyTpl let-candidate let-rowIndex="rowIndex">
      <tr>
        <td class="pl-6">{{ rowIndex + 1 }}</td>
        <td>{{ candidate.name }}</td>
        <td>{{ candidate.age }}</td>
        <td>{{ candidate.gender }}</td>
        <td>{{ candidate.marks }}%</td>
        <td>
          <p-tag [value]="candidate.status" [severity]="statusSeverity(candidate.status)" />
        </td>
        <td class="text-center pr-6">
          <button
            type="button"
            (click)="onReplace(candidate)"
            [disabled]="candidate.status === 'Replaced'"
            class="flex items-center justify-center w-8 h-8 rounded-lg text-value hover:bg-row-b hover:text-heading transition-colors mx-auto disabled:opacity-40 disabled:cursor-not-allowed disabled:hover:bg-transparent"
            aria-label="Replace candidate"
            pTooltip="Replace"
            tooltipPosition="top"
          >
            <i class="pi pi-sync text-sm"></i>
          </button>
        </td>
      </tr>
    </ng-template>
  </app-data-table>
</div>
