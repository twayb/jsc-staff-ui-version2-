<div class="w-full px-4 sm:px-6 py-10">
  <app-breadcrumb [items]="breadcrumbItems" />

  <div class="bg-card border border-border rounded-2xl overflow-hidden animate-fade-in-up stagger-1 mt-6">
    <p-tabs [(value)]="activeTab" class="block">
      <p-tablist>
        <p-tab value="longlist"><i class="pi pi-list mr-2"></i>Longlist</p-tab>
        <p-tab value="distribution"><i class="pi pi-share-alt mr-2"></i>Longlist Distribution</p-tab>
        <p-tab value="shortlist"><i class="pi pi-check-circle mr-2"></i>Shortlist</p-tab>
        <p-tab value="not-shortlist"><i class="pi pi-times-circle mr-2"></i>Not Shortlisted</p-tab>
      </p-tablist>

      <p-tabpanels>
        <p-tabpanel value="longlist" class="block animate-tab-slide">
          <app-data-table
            [card]="false"
            title="Longlisted Applicants"
            [subtitle]="advertName() ? 'Applicants who passed initial screening for ' + advertName() : 'Applicants who passed initial screening for this advert'"
            [data]="applicants"
            [loading]="loading()"
            [searchFields]="['name', 'nin', 'status']"
            dataKey="nin"
          >
            <ng-template #headerTpl>
              <tr>
                <th class="pl-6">No</th>
                <th>Applicant</th>
                <th>NIN</th>
                <th>Application Date</th>
                <th>Status</th>
                <th class="text-center pr-6">Action</th>
              </tr>
            </ng-template>

            <ng-template #bodyTpl let-applicant let-rowIndex="rowIndex">
              <tr>
                <td class="pl-6">{{ rowIndex + 1 }}</td>
                <td>{{ applicant.name }}</td>
                <td>{{ applicant.nin }}</td>
                <td>{{ applicant.applicationDate }}</td>
                <td>
                  <p-tag [value]="applicant.status" [severity]="applicantStatusSeverity(applicant.status)" />
                </td>
                <td class="text-center pr-6">
                  <button
                    type="button"
                    (click)="onView(applicant)"
                    class="flex items-center justify-center w-8 h-8 rounded-lg text-value hover:bg-row-b hover:text-heading transition-colors mx-auto"
                    aria-label="View applicant"
                    pTooltip="View"
                    tooltipPosition="top"
                  >
                    <i class="pi pi-eye text-sm"></i>
                  </button>
                </td>
              </tr>
            </ng-template>
          </app-data-table>
        </p-tabpanel>

        <p-tabpanel value="distribution" class="block animate-tab-slide">
          <app-longlist-distribution [advertId]="advertId" />
        </p-tabpanel>

        <p-tabpanel value="shortlist" class="block animate-tab-slide">
          <app-shortlist [advertId]="advertId" />
        </p-tabpanel>

        <p-tabpanel value="not-shortlist" class="block animate-tab-slide">
          <app-not-shortlist [advertId]="advertId" />
        </p-tabpanel>
      </p-tabpanels>
    </p-tabs>
  </div>
</div>
