<app-data-table
  [card]="false"
  title="Longlist Distribution"
  subtitle="Distribution of longlisted applicants to interview panels"
  [data]="rows"
  [loading]="loading()"
  [searchFields]="['name']"
  addLabel="Distribute Longlist"
  addIcon="pi pi-share-alt"
  dataKey="name"
  (add)="onDistribute()"
>
  <ng-template #headerTpl>
    <tr>
      <th class="pl-6">No</th>
      <th>Name</th>
      <th>Applications</th>
      <th>Shortlist</th>
      <th>Unshortlisted</th>
      <th>Pending</th>
      <th class="text-center pr-6">Action</th>
    </tr>
  </ng-template>

  <ng-template #bodyTpl let-row let-rowIndex="rowIndex">
    <tr>
      <td class="pl-6">{{ rowIndex + 1 }}</td>
      <td>{{ row.name }}</td>
      <td>{{ row.applications }}</td>
      <td>{{ row.shortlist }}</td>
      <td>{{ row.unshortlisted }}</td>
      <td>{{ row.pending }}</td>
      <td class="text-center pr-6">
        <button
          type="button"
          (click)="onView(row)"
          class="flex items-center justify-center w-8 h-8 rounded-lg text-value hover:bg-row-b hover:text-heading transition-colors mx-auto"
          aria-label="View distribution"
          pTooltip="View"
          tooltipPosition="top"
        >
          <i class="pi pi-eye text-sm"></i>
        </button>
      </td>
    </tr>
  </ng-template>
</app-data-table>
