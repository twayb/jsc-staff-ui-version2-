<div class="w-full px-4 sm:px-6 py-10">
  <app-breadcrumb [items]="breadcrumbItems" />

  <app-data-table
    class="block animate-fade-in-up stagger-1"
    title="Selection List"
    [subtitle]="cadre ? 'Selected candidates for ' + cadre : 'Selected candidates'"
    [data]="candidates()"
    [loading]="loading()"
    [searchFields]="['name', 'interviewNo', 'status', 'remarks']"
    dataKey="applicationId"
  >
    <ng-template #headerTpl>
      <tr>
        <th class="pl-6">No</th>
        <th>Name</th>
        <th>Interview No</th>
        <th>Gender</th>
        <th>Marks</th>
        <th>Status</th>
        <th>Remarks</th>
        <th class="text-center pr-6">Action</th>
      </tr>
    </ng-template>

    <ng-template #bodyTpl let-candidate let-rowIndex="rowIndex">
      <tr>
        <td class="pl-6">{{ rowIndex + 1 }}</td>
        <td>{{ candidate.name }}</td>
        <td>{{ candidate.interviewNo }}</td>
        <td>{{ candidate.gender }}</td>
        <td>{{ candidate.marks }}%</td>
        <td>
          <p-tag [value]="statusLabel(candidate.status)" [severity]="statusSeverity(candidate.status)" />
        </td>
        <td>
          <p-tag [value]="remarksLabel(candidate.remarks)" [severity]="remarksSeverity(candidate.remarks)" />
        </td>
        <td class="text-center pr-6">
          <button
            type="button"
            (click)="onApprove(candidate)"
            [disabled]="candidate.status === 'APPROVED'"
            class="flex items-center justify-center w-8 h-8 rounded-lg text-value hover:bg-row-b hover:text-heading transition-colors mx-auto disabled:opacity-40 disabled:cursor-not-allowed disabled:hover:bg-transparent"
            aria-label="Approve selection"
            pTooltip="Approve"
            tooltipPosition="top"
          >
            <i class="pi pi-check-circle text-sm"></i>
          </button>
        </td>
      </tr>
    </ng-template>
  </app-data-table>
</div>
