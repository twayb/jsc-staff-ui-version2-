<div class="w-full px-4 sm:px-6 py-10">
  <app-breadcrumb [items]="breadcrumbItems" />

  @if (loading()) {
    <app-skeleton variant="cards" [count]="2" [cardCols]="2" />
  } @else {
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-6 mb-6">
      <div class="bg-card border border-border rounded-2xl p-6 flex items-center gap-4 animate-fade-in-up stagger-1">
        <span class="flex items-center justify-center w-12 h-12 rounded-xl shrink-0 bg-success-bg">
          <i class="pi pi-user-plus text-xl text-success"></i>
        </span>
        <div>
          <p class="text-2xl font-semibold text-heading tabular-nums" [appCountUp]="totalSelections()"></p>
          <p class="text-sm text-value">Total Selections</p>
        </div>
      </div>
      <div class="bg-card border border-border rounded-2xl p-6 flex items-center gap-4 animate-fade-in-up stagger-2">
        <span class="flex items-center justify-center w-12 h-12 rounded-xl shrink-0 bg-info-bg">
          <i class="pi pi-calendar text-xl text-info"></i>
        </span>
        <div>
          <p class="text-2xl font-semibold text-heading tabular-nums" [appCountUp]="totalCadres()"></p>
          <p class="text-sm text-value">Cadres with Selections</p>
        </div>
      </div>
    </div>
  }

  <app-data-table
    class="block animate-fade-in-up stagger-1"
    title="Selection by Cadre"
    subtitle="Manage candidate selection per cadre"
    [data]="cadres()"
    [loading]="loading()"
    [searchFields]="['referenceNo', 'cadre']"
    dataKey="advertId"
  >
    <ng-template #headerTpl>
      <tr>
        <th class="pl-6">No</th>
        <th>Ref No</th>
        <th>Cadre</th>
        <th>Close Date</th>
        <th>Total Selection</th>
        <th class="text-center pr-6">Action</th>
      </tr>
    </ng-template>

    <ng-template #bodyTpl let-cadre let-rowIndex="rowIndex">
      <tr>
        <td class="pl-6">{{ rowIndex + 1 }}</td>
        <td>{{ cadre.referenceNo }}</td>
        <td>{{ cadre.cadre }}</td>
        <td>{{ cadre.closeDate }}</td>
        <td>{{ cadre.totalSelection }}</td>
        <td class="text-center pr-6">
          <button
            type="button"
            (click)="onView(cadre)"
            class="flex items-center justify-center w-8 h-8 rounded-lg text-value hover:bg-row-b hover:text-heading transition-colors mx-auto"
            aria-label="View selection"
            pTooltip="View Selection"
            tooltipPosition="top"
          >
            <i class="pi pi-eye text-sm"></i>
          </button>
        </td>
      </tr>
    </ng-template>
  </app-data-table>
</div>
