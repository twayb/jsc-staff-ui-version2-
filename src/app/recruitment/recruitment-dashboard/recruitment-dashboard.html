<div class="max-w-6xl w-full mx-auto px-4 sm:px-8 py-10">
  <div class="mb-8 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 animate-fade-in-up">
    <div>
      <h1 class="text-2xl font-semibold text-heading">Recruitment Dashboard</h1>
      <p class="text-sm text-value mt-1">Manage adverts, longlist & shortlist</p>
    </div>
    <!-- <p-button label="New Job Posting" icon="pi pi-plus" [fluid]="false" /> -->
  </div>

  @if (loading()) {
    <app-skeleton variant="cards" [count]="4" [cardCols]="4" />
  } @else {
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
      @for (stat of stats; track stat.label; let i = $index) {
        <a
          [routerLink]="stat.route"
          class="bg-card border border-border rounded-2xl p-6 flex items-center gap-4 transition-all duration-200 animate-fade-in-up"
          [class]="'stagger-' + (i + 1)"
          [ngClass]="{
            'hover:shadow-lg hover:-translate-y-1 cursor-pointer': stat.route,
            'pointer-events-none': !stat.route
          }"
        >
          <span class="flex items-center justify-center w-12 h-12 rounded-xl shrink-0" [class]="stat.bgClass">
            <i class="pi text-xl" [class]="[stat.icon, stat.fgClass]"></i>
          </span>
          <div>
            <p class="text-2xl font-semibold text-heading">{{ stat.value }}</p>
            <p class="text-sm text-value">{{ stat.label }}</p>
          </div>
        </a>
      }
    </div>
  }
</div>
