<div class="w-full px-4 sm:px-6 py-10">
  <app-breadcrumb [items]="breadcrumbItems" />

  <app-data-table
    class="block animate-fade-in-up stagger-1"
    title="Interview Types"
    subtitle="Interview types"
    [data]="interviewTypes()"
    [loading]="loading()"
    [searchFields]="['name']"
    dataKey="id"
  >
    <ng-template #headerTpl>
      <tr>
        <th class="pl-6">No</th>
        <th>Name</th>
        <th class="pr-6">Level</th>
      </tr>
    </ng-template>

    <ng-template #bodyTpl let-interviewType let-rowIndex="rowIndex">
      <tr>
        <td class="pl-6">{{ rowIndex + 1 }}</td>
        <td>{{ interviewType.name }}</td>
        <td class="pr-6">{{ interviewType.level }}</td>
      </tr>
    </ng-template>
  </app-data-table>
</div>
