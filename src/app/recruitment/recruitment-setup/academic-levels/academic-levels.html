<div class="w-full px-4 sm:px-6 py-10">
  <app-breadcrumb [items]="breadcrumbItems" />

  <app-data-table
    class="block animate-fade-in-up stagger-1"
    title="Academic Levels"
    subtitle="Manage academic levels and their ranking"
    [data]="academicLevels()"
    [loading]="loading()"
    [searchFields]="['name']"
    dataKey="id"
  >
    <ng-template #headerTpl>
      <tr>
        <th class="pl-6">No</th>
        <th>Name</th>
        <th>Level</th>
        <th class="text-center pr-6">Action</th>
      </tr>
    </ng-template>

    <ng-template #bodyTpl let-academicLevel let-rowIndex="rowIndex">
      <tr>
        <td class="pl-6">{{ rowIndex + 1 }}</td>
        <td>{{ academicLevel.name }}</td>
        <td>{{ academicLevel.level }}</td>
        <td class="text-center pr-6">
          <button
            type="button"
            (click)="openActionMenu($event, academicLevel, actionMenu)"
            class="flex items-center justify-center w-8 h-8 rounded-lg text-value hover:bg-row-b hover:text-heading transition-colors mx-auto"
            aria-label="Row actions"
          >
            <i class="pi pi-ellipsis-v text-sm"></i>
          </button>
        </td>
      </tr>
    </ng-template>
  </app-data-table>

  <p-menu
    #actionMenu
    class="text-sm"
    [model]="actionMenuItems"
    [popup]="true"
    appendTo="body"
    [motionOptions]="{ duration: { enter: 200, leave: 150 } }"
  />
</div>
