<div class="w-full px-4 sm:px-6 py-10">
  <app-breadcrumb [items]="breadcrumbItems" />

  <app-data-table
    class="block animate-fade-in-up stagger-1"
    title="Attachment Types"
    subtitle="Manage document attachment types"
    [data]="attachmentTypes()"
    [loading]="loading()"
    [searchFields]="['name']"
    addLabel="Add Attachment Type"
    addIcon="pi pi-plus"
    dataKey="id"
    (add)="openAddDialog()"
  >
    <ng-template #headerTpl>
      <tr>
        <th class="pl-6">No</th>
        <th>Name</th>
        <th class="text-center pr-6">Action</th>
      </tr>
    </ng-template>

    <ng-template #bodyTpl let-attachmentType let-rowIndex="rowIndex">
      <tr>
        <td class="pl-6">{{ rowIndex + 1 }}</td>
        <td>{{ attachmentType.name }}</td>
        <td class="text-center pr-6">
          <button
            type="button"
            (click)="openActionMenu($event, attachmentType, actionMenu)"
            class="flex items-center justify-center w-8 h-8 rounded-lg text-value hover:bg-row-b hover:text-heading transition-colors mx-auto"
            aria-label="Row actions"
          >
            <i class="pi pi-ellipsis-v text-sm"></i>
          </button>
        </td>
      </tr>
    </ng-template>
  </app-data-table>

  <p-menu
    #actionMenu
    class="text-sm"
    [model]="actionMenuItems"
    [popup]="true"
    appendTo="body"
    [motionOptions]="{ duration: { enter: 200, leave: 150 } }"
  />

  <p-dialog
    [(visible)]="showFormDialog"
    [header]="dialogMode === 'edit' ? 'Edit Attachment Type' : 'Add Attachment Type'"
    [modal]="true"
    [draggable]="false"
    [style]="{ width: '28rem' }"
  >
    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-4 pt-2">
      <div class="flex flex-col gap-1.5">
        <label for="name" class="text-sm font-medium text-heading">Name</label>
        <input pInputText id="name" formControlName="name" fluid placeholder="e.g. Academic Certificate" />
        @if (form.controls.name.invalid && form.controls.name.touched) {
          <span class="text-xs text-danger">Name is required</span>
        }
      </div>

      <div class="flex justify-end gap-2 pt-2">
        <p-button label="Cancel" severity="secondary" [text]="true" type="button" (onClick)="showFormDialog = false" />
        <p-button [label]="dialogMode === 'edit' ? 'Update' : 'Save'" type="submit" [loading]="submitting()" />
      </div>
    </form>
  </p-dialog>
</div>
