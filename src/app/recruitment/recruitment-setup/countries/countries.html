<div class="w-full px-4 sm:px-6 py-10">
  <app-breadcrumb [items]="breadcrumbItems" />

  <app-data-table
    class="block animate-fade-in-up stagger-1"
    title="Countries"
    subtitle="Countries, ISO codes, and phone codes"
    [data]="countries()"
    [loading]="loading()"
    [searchFields]="['name', 'iso', 'phoneCode']"
    dataKey="id"
  >
    <p-button
      tableAction
      label="Sync"
      icon="pi pi-sync"
      [text]="true"
      [loading]="syncing()"
      (onClick)="onSync()"
      class="transition-transform duration-150 hover:scale-105 active:scale-95"
    />

    <ng-template #headerTpl>
      <tr>
        <th class="pl-6">No</th>
        <th>Name</th>
        <th>ISO</th>
        <th class="pr-6">Phone Code</th>
      </tr>
    </ng-template>

    <ng-template #bodyTpl let-country let-rowIndex="rowIndex">
      <tr>
        <td class="pl-6">{{ rowIndex + 1 }}</td>
        <td>{{ country.name }}</td>
        <td>{{ country.iso }}</td>
        <td class="pr-6">{{ country.phoneCode }}</td>
      </tr>
    </ng-template>
  </app-data-table>
</div>
