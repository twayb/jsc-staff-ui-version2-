<div class="w-full px-4 sm:px-6 py-10">
  <app-breadcrumb [items]="breadcrumbItems()" />

  <app-data-table
    class="block animate-fade-in-up stagger-1"
    title="Distribute by Region"
    [subtitle]="interviewTitle ? 'Applicant distribution by region for ' + interviewTitle : 'Applicant distribution by region'"
    [data]="regions()"
    [loading]="loading()"
    [searchFields]="['region']"
    dataKey="regionId"
  >
    <ng-template #headerTpl>
      <tr>
        <th class="pl-6">No</th>
        <th>Region</th>
        <th>Applicants</th>
        <th class="text-center pr-6">Action</th>
      </tr>
    </ng-template>

    <ng-template #bodyTpl let-region let-rowIndex="rowIndex">
      <tr>
        <td class="pl-6">{{ rowIndex + 1 }}</td>
        <td>{{ region.region }}</td>
        <td>{{ region.applicants }}</td>
        <td class="text-center pr-6">
          <button
            type="button"
            (click)="openActionMenu($event, region, actionMenu)"
            class="flex items-center justify-center w-8 h-8 rounded-lg text-value hover:bg-row-b hover:text-heading transition-colors mx-auto"
            aria-label="Row actions"
          >
            <i class="pi pi-ellipsis-v text-sm"></i>
          </button>
        </td>
      </tr>
    </ng-template>
  </app-data-table>

  <p-menu
    #actionMenu
    class="text-sm"
    [model]="actionMenuItems"
    [popup]="true"
    appendTo="body"
    [motionOptions]="{ duration: { enter: 200, leave: 150 } }"
  />

  <p-dialog
    [(visible)]="showVenueDialog"
    header="Set Venue"
    [modal]="true"
    [draggable]="false"
    [style]="{ width: '36rem' }"
  >
    @if (venueRegion) {
      <form [formGroup]="venueForm" (ngSubmit)="onSaveVenue()" class="flex flex-col gap-4 pt-2">
        <div class="flex flex-col gap-1.5">
          <label class="text-sm font-medium text-heading">Region</label>
          <p class="text-sm text-value bg-row-b rounded-lg px-3 py-2">{{ venueRegion.region }}</p>
        </div>

        <div class="flex flex-col gap-1.5">
          <label for="venues" class="text-sm font-medium text-heading">Venue</label>
          <p-multiselect
            inputId="venues"
            formControlName="venues"
            [options]="venueOptions()"
            [loading]="loadingVenues()"
            optionLabel="label"
            optionValue="value"
            placeholder="Select venue(s)"
            display="chip"
            appendTo="body"
            class="w-full"
          />
          @if (venueForm.controls.venues.invalid && venueForm.controls.venues.touched) {
            <span class="text-xs text-danger">At least one venue is required</span>
          }
        </div>

        <div class="flex justify-end gap-2 pt-2">
          <p-button
            label="Cancel"
            severity="secondary"
            [text]="true"
            type="button"
            (onClick)="showVenueDialog = false"
          />
          <p-button label="Set" type="submit" [loading]="submittingVenue()" />
        </div>
      </form>
    }
  </p-dialog>
</div>
