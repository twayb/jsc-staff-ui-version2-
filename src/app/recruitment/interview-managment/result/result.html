<div class="w-full px-4 sm:px-6 py-10">
  <app-breadcrumb [items]="breadcrumbItems()" />

  <app-data-table
    class="block animate-fade-in-up stagger-1"
    title="Results"
    [subtitle]="interviewTitle ? 'Interview results for ' + interviewTitle + ' (cut off: ' + cutOff() + '%)' : 'Interview results (cut off: ' + cutOff() + '%)'"
    [data]="results()"
    [loading]="loading()"
    [searchFields]="['name', 'interviewNo', 'status']"
    dataKey="interviewNo"
  >
    <p-button
      tableAction
      label="Upload Results"
      icon="pi pi-upload"
      [text]="true"
      (onClick)="onUploadResults()"
      class="transition-transform duration-150 hover:scale-105 active:scale-95"
    />
    <p-button
      tableAction
      label="Print Format"
      icon="pi pi-print"
      [text]="true"
      [loading]="exportingFormat()"
      (onClick)="onPrintFormat()"
      class="transition-transform duration-150 hover:scale-105 active:scale-95"
    />
    <p-button
      tableAction
      label="Set Cut Off"
      icon="pi pi-percentage"
      [text]="true"
      (onClick)="openCutOffDialog()"
      class="transition-transform duration-150 hover:scale-105 active:scale-95"
    />
    <p-button
      tableAction
      label="Approve"
      icon="pi pi-check-circle"
      [text]="true"
      (onClick)="onApprove()"
      class="transition-transform duration-150 hover:scale-105 active:scale-95"
    />

    <ng-template #headerTpl>
      <tr>
        <th class="pl-6">No</th>
        <th>Name</th>
        <th>Interview No</th>
        <th>Gender</th>
        <th>Status</th>
        <th class="pr-6">Marks</th>
      </tr>
    </ng-template>

    <ng-template #bodyTpl let-result let-rowIndex="rowIndex">
      <tr>
        <td class="pl-6">{{ rowIndex + 1 }}</td>
        <td>{{ result.name }}</td>
        <td>{{ result.interviewNo }}</td>
        <td>{{ result.gender }}</td>
        <td>
          <p-tag [value]="resultStatusLabel(result.status)" [severity]="resultStatusSeverity(result.status)" />
        </td>
        <td class="pr-6">{{ result.marks }}%</td>
      </tr>
    </ng-template>
  </app-data-table>

  <p-dialog
    [(visible)]="showCutOffDialog"
    header="Set Cut Off Marks"
    [modal]="true"
    [draggable]="false"
    [style]="{ width: '24rem' }"
  >
    <form [formGroup]="cutOffForm" (ngSubmit)="onSaveCutOff()" class="flex flex-col gap-4 pt-2">
      <div class="flex flex-col gap-1.5">
        <label for="cutOff" class="text-sm font-medium text-heading">Cut Off Marks</label>
        <p-inputnumber
          inputId="cutOff"
          formControlName="cutOff"
          [min]="0"
          [max]="100"
          suffix="%"
          [showButtons]="true"
          class="w-full"
        />
        @if (cutOffForm.controls.cutOff.invalid && cutOffForm.controls.cutOff.touched) {
          <span class="text-xs text-danger">Cut off marks is required</span>
        }
      </div>

      <div class="flex justify-end gap-2 pt-2">
        <p-button
          label="Cancel"
          severity="secondary"
          [text]="true"
          type="button"
          (onClick)="showCutOffDialog = false"
        />
        <p-button label="Save" type="submit" [loading]="submittingCutOff()" />
      </div>
    </form>
  </p-dialog>

  <p-dialog
    [(visible)]="showUploadDialog"
    header="Upload Results"
    [modal]="true"
    [draggable]="false"
    [style]="{ width: '24rem' }"
  >
    <div class="flex flex-col gap-4 pt-2">
      <div class="flex flex-col gap-1.5">
        <label class="text-sm font-medium text-heading">File</label>
        <p-fileupload
          mode="basic"
          chooseLabel="Choose File"
          accept=".xlsx,.xls"
          [auto]="false"
          [multiple]="false"
          (onSelect)="onFileSelect($event)"
        />
      </div>

      <div class="flex justify-end gap-2 pt-2">
        <p-button
          label="Cancel"
          severity="secondary"
          [text]="true"
          type="button"
          (onClick)="showUploadDialog = false"
        />
        <p-button
          label="Upload"
          type="button"
          [disabled]="!selectedFile"
          [loading]="submittingUpload()"
          (onClick)="onConfirmUpload()"
        />
      </div>
    </div>
  </p-dialog>
</div>
