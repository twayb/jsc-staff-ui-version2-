<div class="w-full px-4 sm:px-6 py-10">
  <app-breadcrumb [items]="breadcrumbItems" />

  <app-data-table
    class="block animate-fade-in-up stagger-1"
    title="Question Categories"
    subtitle="Manage question category types used across the question bank"
    [data]="categories"
    [loading]="loading()"
    [searchFields]="['category']"
    addLabel="Add Category"
    addIcon="pi pi-plus"
    dataKey="category"
    (add)="openAddDialog()"
  >
    <ng-template #headerTpl>
      <tr>
        <th class="pl-6">No</th>
        <th>Category</th>
        <th>Status</th>
        <th class="text-center pr-6">Action</th>
      </tr>
    </ng-template>

    <ng-template #bodyTpl let-category let-rowIndex="rowIndex">
      <tr>
        <td class="pl-6">{{ rowIndex + 1 }}</td>
        <td>{{ category.category }}</td>
        <td>
          <p-tag [value]="category.status" [severity]="statusSeverity(category.status)" />
        </td>
        <td class="text-center pr-6">
          <button
            type="button"
            (click)="openActionMenu($event, category, actionMenu)"
            class="flex items-center justify-center w-8 h-8 rounded-lg text-value hover:bg-row-b hover:text-heading transition-colors mx-auto"
            aria-label="Row actions"
          >
            <i class="pi pi-ellipsis-v text-sm"></i>
          </button>
        </td>
      </tr>
    </ng-template>
  </app-data-table>

  <p-menu
    #actionMenu
    class="text-sm"
    [model]="actionMenuItems"
    [popup]="true"
    appendTo="body"
    [motionOptions]="{ duration: { enter: 200, leave: 150 } }"
  />

  <p-dialog
    [(visible)]="showFormDialog"
    [header]="dialogMode === 'edit' ? 'Edit Question Category' : 'Add Question Category'"
    [modal]="true"
    [draggable]="false"
    [style]="{ width: '28rem' }"
  >
    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-4 pt-2">
      <div class="flex flex-col gap-1.5">
        <label for="category" class="text-sm font-medium text-heading">Category</label>
        <p-select
          inputId="category"
          formControlName="category"
          [options]="categoryOptions"
          optionLabel="label"
          optionValue="value"
          placeholder="Select category"
          class="w-full"
          appendTo="body"
        />
        @if (form.controls.category.invalid && form.controls.category.touched) {
          <span class="text-xs text-danger">Category is required</span>
        }
      </div>

      <div class="flex flex-col gap-1.5">
        <label for="status" class="text-sm font-medium text-heading">Status</label>
        <p-select
          inputId="status"
          formControlName="status"
          [options]="statusOptions"
          optionLabel="label"
          optionValue="value"
          placeholder="Select status"
          class="w-full"
          appendTo="body"
        />
      </div>

      <div class="flex justify-end gap-2 pt-2">
        <p-button label="Cancel" severity="secondary" [text]="true" type="button" (onClick)="showFormDialog = false" />
        <p-button [label]="dialogMode === 'edit' ? 'Update' : 'Save'" type="submit" />
      </div>
    </form>
  </p-dialog>
</div>
